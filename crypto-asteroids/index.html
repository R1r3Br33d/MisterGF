<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Asteroids: Bitcoin Mining Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000814 0%, #1a0033 100%);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #00FF00;
        }

        .container {
            width: 900px;
            background: rgba(0, 8, 20, 0.95);
            border: 2px solid #00FF00;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 0 10px #00FF00;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 12px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #000814;
            border: 1px solid #00FF00;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: #1a1a2e;
            border: 2px solid #00FF00;
            color: #00FF00;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover {
            background: #00FF00;
            color: #000814;
            box-shadow: 0 0 10px #00FF00;
        }

        button:active {
            transform: scale(0.95);
        }

        .difficulty-select {
            background: #1a1a2e;
            border: 2px solid #00FF00;
            color: #00FF00;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border-radius: 4px;
            grid-column: span 3;
        }

        .difficulty-select option {
            background: #1a1a2e;
            color: #00FF00;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #16213e;
            border: 1px solid #00FF00;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            color: #00FF00;
            font-weight: bold;
            text-shadow: 0 0 5px #00FF00;
        }

        .key-bindings {
            margin-top: 20px;
            padding: 15px;
            background: #16213e;
            border: 1px solid #00FF00;
            border-radius: 4px;
            font-size: 11px;
        }

        .key-bindings h3 {
            margin-bottom: 10px;
            color: #00FF00;
        }

        .binding {
            margin: 5px 0;
            color: #888;
        }

        .binding strong {
            color: #00FF00;
        }

        .game-message {
            text-align: center;
            padding: 20px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #FF0000;
            border-radius: 4px;
            margin-top: 10px;
            display: none;
            color: #FF0000;
        }

        .game-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>₿ CRYPTO ASTEROIDS ₿</h1>
        <p class="subtitle">Mine Bitcoin. Destroy Rocks. Earn Satoshis.</p>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="controls">
            <button id="startBtn" onclick="game.start()">START GAME</button>
            <button id="pauseBtn" onclick="togglePause()">PAUSE</button>
            <button id="resetBtn" onclick="resetGame()">RESET</button>
            <button onclick="fireWeapon('laser')">🔫 LASER</button>
            <button onclick="fireWeapon('emp')">⚡ EMP</button>
            <button onclick="fireWeapon('mining_beam')">⛏️ MINE</button>
            <button onclick="game.activateShield()">🛡️ SHIELD</button>
            <button onclick="moveUp()">↑ UP</button>
            <button onclick="moveDown()">↓ DOWN</button>
            
            <select id="difficultySelect" class="difficulty-select" onchange="changeDifficulty()">
                <option value="easy">DIFFICULTY: EASY (0.5x)</option>
                <option value="normal" selected>DIFFICULTY: NORMAL (1.0x)</option>
                <option value="hard">DIFFICULTY: HARD (1.5x)</option>
                <option value="nightmare">DIFFICULTY: NIGHTMARE (2.5x)</option>
            </select>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">BALANCE</div>
                <div class="stat-value" id="balanceDisplay">0.00000000</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="levelDisplay">1</div>
            </div>
        </div>

        <div class="key-bindings">
            <h3>⌨️ KEYBOARD CONTROLS</h3>
            <div class="binding"><strong>Arrow Keys</strong> - Move</div>
            <div class="binding"><strong>Z</strong> - Fire Laser</div>
            <div class="binding"><strong>X</strong> - Fire EMP</div>
            <div class="binding"><strong>C</strong> - Fire Mining Beam</div>
            <div class="binding"><strong>Space</strong> - Activate Shield</div>
            <div class="binding"><strong>P</strong> - Pause/Resume</div>
        </div>

        <div class="game-message" id="gameMessage"></div>
    </div>

    <script src="game.ts"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const game = new CryptoAsteroidsGame(canvas, {
            canvasWidth: 800,
            canvasHeight: 600
        });

        let isPaused = false;
        const keys = {};

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (e.key.toLowerCase() === 'z') fireWeapon('laser');
            if (e.key.toLowerCase() === 'x') fireWeapon('emp');
            if (e.key.toLowerCase() === 'c') fireWeapon('mining_beam');
            if (e.key.toLowerCase() === ' ') {
                e.preventDefault();
                game.activateShield();
            }
            if (e.key.toLowerCase() === 'p') togglePause();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Game loop for input
        setInterval(() => {
            if (isPaused || !game.getGameState().gameActive) return;

            let moveX = 0;
            let moveY = 0;

            if (keys['arrowleft'] || keys['a']) moveX = -1;
            if (keys['arrowright'] || keys['d']) moveX = 1;
            if (keys['arrowup'] || keys['w']) moveY = -1;
            if (keys['arrowdown'] || keys['s']) moveY = 1;

            if (moveX !== 0 || moveY !== 0) {
                game.movePlayer(moveX, moveY);
            }
        }, 16);

        function fireWeapon(type) {
            if (!game.getGameState().gameActive || isPaused) return;
            game.fireWeapon(type);
        }

        function moveUp() {
            game.movePlayer(0, -1);
        }

        function moveDown() {
            game.movePlayer(0, 1);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? 'RESUME' : 'PAUSE';
        }

        function resetGame() {
            game.reset();
            game.start();
            isPaused = false;
            document.getElementById('pauseBtn').textContent = 'PAUSE';
        }

        function changeDifficulty() {
            const select = document.getElementById('difficultySelect');
            game.setDifficulty(select.value);
        }

        // Update HUD
        game.on('game_over', (event) => {
            const msg = document.getElementById('gameMessage');
            msg.textContent = `GAME OVER! Final Score: ${event.data.finalScore} | Total Mined: ${(event.data.totalMined / 100000000).toFixed(8)} BTC`;
            msg.classList.add('show');
        });

        // Update stats display
        setInterval(() => {
            const state = game.getGameState();
            document.getElementById('balanceDisplay').textContent = (state.player.wallet.btc / 100000000).toFixed(8);
            document.getElementById('scoreDisplay').textContent = state.score;
            document.getElementById('levelDisplay').textContent = state.level;
        }, 100);
    </script>
</body>
</html>
